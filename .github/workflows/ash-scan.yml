
name: ASH Security Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  ash_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # GOVERNANCE CHECK (NEW)
      # =========================
      - name: Validate Email Domain
        run: |
          EMAIL=$(git log -1 --pretty=format:'%ae')

          echo "Commit Email: $EMAIL"

          if [[ ! "$EMAIL" =~ @usefulbi\.com$ ]]; then
            echo "ERROR: Only @usefulbi.com emails are allowed"
            exit 1
          fi

      # =========================
      # ASH SECURITY SCAN FLOW
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ASH
        run: |
          pip install git+https://github.com/awslabs/automated-security-helper.git@v3.5.4

      - name: Run ASH Scan
        run: |
          ash --mode local

      - name: Upload ASH Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-results
          path: .ash/ash_output
