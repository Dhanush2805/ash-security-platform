
name: ASH Security Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  ash_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

        #========================
        #TEST 
        #========================
      - name: TEST STEP
        run: echo "CENTRALIZED WORKFLOW VERSION 1.0.13"
      # =========================
      # GOVERNANCE CHECK (NEW)
      # =========================
      - name: Validate Email Domain
        run: |
          EMAIL=$(git log -1 --pretty=format:'%ae')

          echo "Commit Email: $EMAIL"

          if [[ ! "$EMAIL" =~ @usefulbi\.com$ && "$EMAIL" != "91242235+Dhanush2805@users.noreply.github.com" ]]; then
            echo "ERROR: Only @usefulbi.com emails are allowed"
            exit 1
          fi

      # =========================
      # MODULE LICENSE VALIDATION
      # =========================
      - name: Validate Module Licenses
        run: |

          if [ ! -f requirements.txt ]; then
            echo "No requirements.txt found. Skipping license validation."
            exit 0
          fi

          echo "Running Module License Compliance Checker..."

          APPROVED_LICENSES=(
            "Apache"
            "Apache-2.0"
            "Apache 2.0"
            "Apache-1.1"

            "BSD"
            "BSD-1-Clause"
            "BSD-2-Clause"
            "BSD-2-Clause-FreeBSD"
            "BSD-3-Clause"
            "BSD-3-Clause-Attribution"
            "BSD-Source-Code"
            "0BSD"
            "EDL"
            "HDF5"
            "OLDAP-2.8"

            "MIT"
            "ISC"
            "X11"
            "BouncyCastle"
            "Boost"
            "PostgreSQL"
            "PIL"
            "curl"
            "NTP"

            "Zlib"
            "zlib-acknowledgement"
            "libpng"
            "bzip2"
            "Spencer-94"

            "Python Software Foundation"
            "Python-2.0"
            "Python-2.1.1"

            "OpenSSL"
            "JSON"
            "libjpeg"

            "WTFPL"
            "WTFPL-2.0"
            "WTF"

            "Unicode"
            "Unicode-DFS-2015"
            "Unicode-DFS-2016"

            "CC-Zero"
            "CC0"
            "SQLite"
            "Unlicense"
            "ODC Public Domain"

            "Realm SDK License"

            "SIL Open Font License"
            "OFL"

            # Project-specific approvals
            "Pillow"
            "Python Imaging Library"
            "FreeType"
            "ICU"
            "libtiff"
            "SPIRV-Headers"
          )

          RESTRICTED_FOUND=0

          while IFS= read -r line || [ -n "$line" ]; do

            PACKAGE=$(echo "$line" | xargs)

            if [[ -z "$PACKAGE" ]]; then
              continue
            fi

            if [[ "$PACKAGE" =~ ^# ]]; then
              continue
            fi

            if [[ "$PACKAGE" =~ ^-r ]]; then
              continue
            fi

            if [[ "$PACKAGE" =~ ^-e ]]; then
              continue
            fi

            if [[ "$PACKAGE" =~ ^git\+ ]]; then
              continue
            fi

            PACKAGE_NAME=$(echo "$PACKAGE" | sed 's/[<>=!~].*$//')

            echo "Checking package: $PACKAGE_NAME"

            RESPONSE=$(curl -s "https://pypi.org/pypi/${PACKAGE_NAME}/json")

            # =====================================================
            # LICENSE EXTRACTION
            # Same order as PowerShell hook:
            # license_expression -> license -> classifiers -> UNKNOWN
            # =====================================================

            LICENSE=$(echo "$RESPONSE" | grep -o '"license_expression":"[^"]*"' | head -1 | cut -d':' -f2- | tr -d '"')

            if [ -z "$LICENSE" ] || [ "$LICENSE" = "null" ]; then
              LICENSE=$(echo "$RESPONSE" | grep -o '"license":"[^"]*"' | head -1 | cut -d':' -f2- | tr -d '"')
            fi

            if [ -z "$LICENSE" ] || [ "$LICENSE" = "null" ]; then
              LICENSE=$(echo "$RESPONSE" | grep -o 'License :: [^"]*' | head -1)
            fi

            if [ -z "$LICENSE" ] || [ "$LICENSE" = "null" ]; then
              LICENSE="UNKNOWN"
            fi

            echo "License: $LICENSE"

            APPROVED=0

            for ALLOWED in "${APPROVED_LICENSES[@]}"; do

              if [[ "$LICENSE" == *"$ALLOWED"* ]]; then
                APPROVED=1
                break
              fi

            done

            if [ $APPROVED -eq 0 ]; then

              echo "❌ NON-APPROVED LICENSE: $PACKAGE_NAME -> $LICENSE"
              RESTRICTED_FOUND=1

            else

              echo "✅ APPROVED LICENSE: $PACKAGE_NAME -> $LICENSE"

            fi

          done < requirements.txt

          if [ $RESTRICTED_FOUND -eq 1 ]; then

            echo "❌ MODULE LICENSE COMPLIANCE FAILED"
            exit 1

          fi

          echo "✅ MODULE LICENSE COMPLIANCE PASSED"

      # =========================
      # ASH SECURITY SCAN FLOW
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Install ASH & CDK Dependencies
        run: |
          #pip install git+https://github.com/awslabs/automated-security-helper.git@v3.5.4
          pip install git+https://github.com/Dhanush2805/automated-security-helper.git@main
          
          # Required for CDK-Nag
          pip install aws-cdk-lib==2.260.0
          pip install constructs
          pip install cdk-nag==2.28.195

      ####################
      #Semgrep Installation
      #####################
      
      - name: Install Semgrep
        run: |
          pip install semgrep
          pip install "typer<0.20"

          semgrep --version

      - name: Debug Repository
        run: |
          echo "===== Current Directory ====="
          pwd

          echo "===== Repository Files ====="
          find .

          echo "===== app.py ====="
          cat app.py || true

      - name: Debug Rules
        continue-on-error: true
        run: |
          semgrep show-config --config p/ci
    
      ###################          
      #Grype Installation
      ###################
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

          grype version
      # =========================
      # VERIFY CUSTOM ASH INSTALL
      # =========================
      - name: Verify Custom ASH
        run: |
          python -c "import automated_security_helper; print(automated_security_helper.__file__)"

      # =========================
      # VERIFY GRYPE INSTALLATION
      # =========================
      - name: Verify Grype
        run: |
          which grype || true
          grype version || true


      - name: Verify CDK Environment
        run: |
          python --version
          node --version
          npm --version

          pip show typer
          pip show automated-security-helper
          pip show aws-cdk-lib
          pip show constructs
          pip show cdk-nag

          python -c "import cdk_nag; print('✅ cdk_nag imported successfully')"
          python -c "from aws_cdk import App; print('✅ aws_cdk imported successfully')"
      
      - name: Run ASH Scan
        run: |
          ash --mode local
          
      ####################################################
      # ADD THIS DEBUG STEP HERE
      ####################################################
      - name: Debug ASH Output
        if: always()
        run: |
          pwd

          echo "========== HOME =========="
          echo $HOME

          echo "========== WORKSPACE =========="
          echo $GITHUB_WORKSPACE

          echo "========== SEARCHING FOR ash_output =========="
          find /home/runner -type d -name "ash_output" 2>/dev/null || true

          echo "========== SEARCHING FOR .ash =========="
          find /home/runner -type d -name ".ash" 2>/dev/null || true

          echo "========== SEARCHING FOR SARIF =========="
          find /home/runner -name "*.sarif" 2>/dev/null || true

          echo "========== SEARCHING FOR SEMGREP =========="
          find /home/runner -iname "*semgrep*" 2>/dev/null || true

          - name: Print Semgrep STDERR
            if: always()
            run: |
              echo "=============================="
              cat .ash/ash_output/scanners/semgrep/source/SemgrepScanner.stderr.log
              
          - name: Print Semgrep STDOUT
            if: always()
            run: |
              echo "=============================="
              cat .ash/ash_output/scanners/semgrep/source/SemgrepScanner.stdout.log

          - name: Count Semgrep Findings
            if: always()
            run: |
              python - <<'EOF'
              import json

              with open(".ash/ash_output/scanners/semgrep/source/results_sarif.sarif") as f:
              sarif = json.load(f)

              runs = sarif.get("runs", [])
              findings = 0

              for run in runs:
                  findings += len(run.get("results", []))

              print(f"TOTAL FINDINGS = {findings}")
              EOF

      ###############################          
      - name: Upload ASH Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-results
          path: .ash/ash_output
