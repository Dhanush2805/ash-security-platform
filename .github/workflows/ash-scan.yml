
name: ASH Security Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  ash_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ASH
        run: |
          pip install git+https://github.com/awslabs/automated-security-helper.git@v3.5.4

      - name: Run ASH Scan
        run: |
          ash --mode local

      - name: Upload ASH Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-results
          path: .ash/ash_output
