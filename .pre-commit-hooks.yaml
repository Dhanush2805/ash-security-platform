- id: ash-pre-commit
  name: ASH Pre Commit Scan
  entry: powershell.exe -NoProfile -Command "
  $ErrorActionPreference='Stop';

  $env:ASH_OUTPUT_DIR = \"$env:TEMP\\ash_output\";

  ash --mode local --no-output-dir
  "
  language: system
  pass_filenames: false
  stages: [pre-commit]

- id: ash-pre-push
  name: ASH Pre Push Scan
  entry: powershell.exe -NoProfile -Command "
  $ErrorActionPreference='Stop';

  $env:ASH_OUTPUT_DIR = \"$env:TEMP\\ash_output\";

  ash --mode local --no-output-dir
  "
  language: system
  pass_filenames: false
  stages: [pre-push]
