- id: ash-pre-commit
  name: ASH Pre Commit Scan
  entry: powershell.exe -NoProfile -Command "ash --mode local; if ($LASTEXITCODE -ne 0) { exit 1 }"
  language: system
  stages: [pre-commit]

- id: ash-pre-push
  name: ASH Pre Push Scan
  entry: powershell.exe -NoProfile -Command "ash --mode local; if ($LASTEXITCODE -ne 0) { exit 1 }"
  language: system
  stages: [pre-push]
