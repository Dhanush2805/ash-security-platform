- id: ash-pre-commit
  name: ASH Pre Commit Scan
  entry: >
    powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "
      $ErrorActionPreference='Stop';

      # =========================
      # EMAIL DOMAIN VALIDATION
      # =========================
      $email = git config user.email
      Write-Host 'Commit Email:' $email

      if ($email -notmatch '@usefulbi\.com$') {
        Write-Host '❌ BLOCKED: Only @usefulbi.com emails allowed'
        exit 1
      }
      
      # =========================
      # EXISTING ASH FLOW (UNCHANGED)
      # =========================

      $out = Join-Path $env:TEMP 'ash_output';

      Remove-Item -Recurse -Force $out -ErrorAction SilentlyContinue;

      ash --mode precommit --output-dir $out
    "
  language: system
  pass_filenames: false
  stages: [pre-commit]

