- id: ash-pre-commit
  name: ASH Pre Commit Scan
  entry: >
    powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "
      $ErrorActionPreference='Stop';

      $out = Join-Path $env:TEMP 'ash_output';

      Remove-Item -Recurse -Force $out -ErrorAction SilentlyContinue;

      ash --mode precommit --output-dir $out
    "
  language: system
  pass_filenames: false
  stages: [pre-commit]

- id: ash-pre-push
  name: ASH Pre Push Scan
  entry: >
    powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "
      $ErrorActionPreference='Stop';

      $out = Join-Path $env:TEMP 'ash_output';

      Remove-Item -Recurse -Force $out -ErrorAction SilentlyContinue;

      ash --mode local --output-dir $out
    "
  language: system
  pass_filenames: false
  stages: [pre-push]
