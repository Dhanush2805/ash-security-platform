- id: ash-pre-commit
  name: ASH Pre Commit Scan
  entry: powershell.exe -NoProfile -Command "
    $env:ASH_OUTPUT_DIR = \"$env:TEMP\ash_output\";
    if (Test-Path .ash) { Remove-Item -Recurse -Force .ash };
    ash --mode local
  "
  language: system
  pass_filenames: false
  stages: [pre-commit]

- id: ash-pre-push
  name: ASH Pre Push Scan
  entry: powershell.exe -NoProfile -Command "
    $env:ASH_OUTPUT_DIR = \"$env:TEMP\ash_output\";
    if (Test-Path .ash) { Remove-Item -Recurse -Force .ash };
    ash --mode local
  "
  language: system
  pass_filenames: false
  stages: [pre-push]
