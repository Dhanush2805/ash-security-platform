- id: ash-pre-commit
  name: ASH Pre Commit Scan
  entry: powershell.exe -NoProfile -Command "
    $tmp = Join-Path $env:TEMP 'ash_scan';
    Remove-Item -Recurse -Force $tmp -ErrorAction SilentlyContinue;
    New-Item -ItemType Directory -Force $tmp | Out-Null;
    ash --mode local --output-dir $tmp;
  "  language: system
  pass_filenames: false
  stages: [pre-commit]

- id: ash-pre-push
  name: ASH Pre Push Scan
  entry: powershell.exe -NoProfile -Command "
    $tmp = Join-Path $env:TEMP 'ash_scan';
    Remove-Item -Recurse -Force $tmp -ErrorAction SilentlyContinue;
    New-Item -ItemType Directory -Force $tmp | Out-Null;
    ash --mode local --output-dir $tmp;
  "  language: system
  pass_filenames: false
  stages: [pre-push]
