- id: ash-pre-commit
  name: ASH Pre Commit Scan
  entry: ash --mode local --output-dir .ash_temp
  language: system
  pass_filenames: false
  stages: [pre-commit]

- id: ash-pre-push
  name: ASH Pre Push Scan
  entry: ash --mode local --output-dir .ash_temp
  language: system
  pass_filenames: false
  stages: [pre-push]
