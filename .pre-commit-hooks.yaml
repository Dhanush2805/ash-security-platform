- id: ash-pre-commit
  name: ASH Pre Commit Scan
  entry: powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "
    $ErrorActionPreference='Stop';

    $out = '.ash/ash_output';

    Remove-Item -Recurse -Force .ash -ErrorAction SilentlyContinue;

    New-Item -ItemType Directory -Force $out | Out-Null;
    New-Item -ItemType Directory -Force \"$out/reports\" | Out-Null;
    New-Item -ItemType Directory -Force \"$out/scanners\" | Out-Null;
    New-Item -ItemType Directory -Force \"$out/analysis\" | Out-Null;

    $env:ASH_OUTPUT_DIR = (Resolve-Path $out);

    ash --mode local
  "
  language: system
  pass_filenames: false
  stages: [pre-commit]

