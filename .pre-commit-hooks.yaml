- id: ash-pre-commit
  name: ASH Pre Commit Scan
  entry: >
    powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "
      $ErrorActionPreference='Stop';

      # =========================
      # EMAIL DOMAIN VALIDATION
      # =========================
      $email = git config user.email
      Write-Host 'Commit Email:' $email

      if ($email -notmatch '@usefulbi\.com$') {
        Write-Host '❌ BLOCKED: Only @usefulbi.com emails allowed'
        exit 1
      }

      # =========================
      # MODULE LICENSE VALIDATION
      # =========================

      if (Test-Path 'requirements.txt') {

        Write-Host 'Running Module License Compliance Checker...'

        $approvedLicenses = @(
          'Apache',
          'Apache-2.0',
          'Apache 2.0',
          'Apache-1.1',

          'BSD',
          'BSD-1-Clause',
          'BSD-2-Clause',
          'BSD-2-Clause-FreeBSD',
          'BSD-3-Clause',
          'BSD-3-Clause-Attribution',
          'BSD-Source-Code',
          '0BSD',
          'EDL',
          'HDF5',
          'OLDAP-2.8',

          'MIT',
          'ISC',
          'X11',
          'BouncyCastle',
          'Boost',
          'PostgreSQL',
          'PIL',
          'curl',
          'NTP',

          'Zlib',
          'zlib-acknowledgement',
          'libpng',
          'bzip2',
          'Spencer-94',

          'Python Software Foundation',
          'Python-2.0',
          'Python-2.1.1',

          'OpenSSL',
          'JSON',
          'libjpeg',

          'WTFPL',
          'WTFPL-2.0',
          'WTF',

          'Unicode',
          'Unicode-DFS-2015',
          'Unicode-DFS-2016',

          'CC-Zero',
          'CC0',
          'SQLite',
          'Unlicense',
          'ODC Public Domain',

          'Realm SDK License',

          'SIL Open Font License',
          'OFL',

          # Project-specific approvals
          'Pillow',
          'Python Imaging Library',
          'FreeType',
          'ICU',
          'libtiff',
          'SPIRV-Headers'
        )

        $restrictedFound = $false

        Get-Content requirements.txt | ForEach-Object {

          $package = $_.Trim()

          if (
            $package -eq '' -or
            $package.StartsWith('#')
          ) {
            return
          }

          $packageName = ($package -replace '[<>=!].*$','').Trim()

          Write-Host 'Checking package:' $packageName

          try {

            $response = Invoke-RestMethod `
              -Uri "https://pypi.org/pypi/$packageName/json" `
              -Method Get `
              -TimeoutSec 10

            # =====================================================
            # LICENSE EXTRACTION (FIXED - supports modern PyPI)
            # =====================================================
            $license = $response.info.license_expression

            if ([string]::IsNullOrWhiteSpace($license)) {
            $license = $response.info.license
            }

            if ([string]::IsNullOrWhiteSpace($license)) {

              $license = (
                $response.info.classifiers |
                Where-Object { $_ -like 'License::*' } |
                Select-Object -First 1
              )

            }

            if ([string]::IsNullOrWhiteSpace($license)) {
              $license = "UNKNOWN"
            }


          }
          catch {

            $license = "UNKNOWN"

          }

          Write-Host 'License:' $license

          $approved = $false

          foreach ($allowed in $approvedLicenses) {

            if ($license -match [regex]::Escape($allowed)) {
              $approved = $true
              break
            }

          }

          if (-not $approved) {

            Write-Host "❌ NON-APPROVED LICENSE: $packageName -> $license"

            $restrictedFound = $true

          }
          else {

            Write-Host "✅ APPROVED LICENSE: $packageName -> $license"

          }

        }

        if ($restrictedFound) {

          Write-Host '❌ MODULE LICENSE COMPLIANCE FAILED'
          exit 1

        }

        Write-Host '✅ MODULE LICENSE COMPLIANCE PASSED'

      }


      # =========================
      # BUILD ALL DOCKER IMAGES
      # =========================
      
      $BuiltImages = @()

      $dockerfiles = Get-ChildItem -Recurse -Filter Dockerfile

      if ($dockerfiles.Count -eq 0) {

          Write-Host ""
          Write-Host "No Dockerfile found."
          Write-Host "Skipping Docker image build."

      }
      else {

          Write-Host ""
          Write-Host "===================================="
          Write-Host "Dockerfiles Found:"
          Write-Host $dockerfiles.Count
          Write-Host "===================================="
          foreach ($dockerfile in $dockerfiles) {

              $context = $dockerfile.DirectoryName

              $folderName = $dockerfile.Directory.Name -replace '[^a-zA-Z0-9-]', '-'
              $imageName = ('ash-' + $folderName).ToLower()
              $BuiltImages += $imageName

              Write-Host ""
              Write-Host "------------------------------------------"
              Write-Host "Dockerfile:"
              Write-Host $dockerfile.FullName

              Write-Host "Image Name:"
              Write-Host $imageName

              Write-Host "Building Docker Image..."

              docker build --tag $imageName $context
              if ($LASTEXITCODE -ne 0) {

                  Write-Host ""
                  Write-Host "Docker build failed."
                  exit 1

              }

              Write-Host "Docker image built successfully."

          }

      }
      Write-Host ""
      Write-Host "==============================="
      Write-Host "Docker Images Built:"
      Write-Host "==============================="

      foreach ($img in $BuiltImages) {
          Write-Host (" - " + $img)
      }
      # =========================
      # EXISTING ASH FLOW (UNCHANGED)
      # =========================

      $out = Join-Path $env:TEMP 'ash_output';

      Remove-Item -Recurse -Force $out -ErrorAction SilentlyContinue;

      ash --mode precommit --output-dir $out
    "
  language: system
  pass_filenames: false
  stages: [pre-commit]


